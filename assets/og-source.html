<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tessera OG image source (1200×630)</title>
<style>
  @font-face { font-family: 'Archivo'; font-weight: 100 900; src: url('fonts/archivo-var-latin.woff2') format('woff2'); }
  @font-face { font-family: 'IBM Plex Mono'; font-weight: 400 500; src: url('fonts/plex-mono-500-latin.woff2') format('woff2'); }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background-color: #EEF0EA;
    background-image: linear-gradient(#D5DAE3 1px, transparent 1px), linear-gradient(90deg, #D5DAE3 1px, transparent 1px);
    background-size: 30px 30px;
    display: flex; align-items: center; gap: 56px;
    padding: 0 72px; font-family: 'Archivo', sans-serif; color: #15233A;
  }
  .left { width: 600px; }
  .brand { display: flex; align-items: center; gap: 14px; font-size: 30px; font-weight: 700; letter-spacing: -0.01em; }
  .brand .node { width: 22px; height: 22px; border: 4px solid #28489E; position: relative; }
  .brand .node::after { content: ""; position: absolute; inset: 4px; background: #28489E; }
  h1 { font-size: 88px; font-weight: 800; line-height: 0.98; letter-spacing: -0.035em; margin: 26px 0 30px; }
  .cmd { font-family: 'IBM Plex Mono', monospace; font-size: 23px; color: #D7E1F1; background: #14233E;
         border: 2px solid #15233A; padding: 15px 20px; display: inline-block; }
  .cmd::before { content: "$ "; color: #7C8DAE; }
  .tags { font-family: 'IBM Plex Mono', monospace; font-size: 16px; color: #4B5566; margin-top: 26px; line-height: 1.5; }
  .panel { width: 440px; flex: none; border: 2px solid #15233A; background: #F5F6F1; }
  .panel svg { display: block; width: 100%; }
  .tblock { display: flex; border-top: 1px solid #AAB4C4; font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #4B5566; }
  .tblock span { padding: 7px 10px; border-right: 1px solid #AAB4C4; }
  .tblock span:last-child { border-right: 0; margin-left: auto; }
  .tblock b { color: #28489E; font-weight: 500; }
  .wire { fill: none; stroke: #AAB4C4; stroke-width: 1.6; }
  .wire.lit { stroke: #28489E; stroke-width: 2.4; }
  .node { fill: #F5F6F1; stroke: #28489E; stroke-width: 1.8; }
  .node.root { fill: #28489E; }
  .lf { fill: #F5F6F1; stroke: #28489E; stroke-width: 1.8; }
  .lf.on { fill: #28489E; }
  .lf.sealed { stroke-dasharray: 3 2; }
  .lh { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #4B5566; text-anchor: middle; }
  .lh.on { fill: #F5F6F1; }
  .anno { font-family: 'IBM Plex Mono', monospace; font-size: 12px; fill: #28489E; }
</style>
</head>
<body>
  <div class="left">
    <div class="brand"><span class="node"></span>TESSERA</div>
    <h1>Prove facts,<br>not data.</h1>
    <div class="cmd">dotnet add package Sagynbaev.Tessera.Sdk</div>
    <div class="tags">Verify users are KYC'd, accredited, or human —<br>without storing their data. A .NET SDK.</div>
  </div>
  <div class="panel">
    <svg viewBox="0 0 440 332">
      <!-- wires (lit path = leaf 5 'jurisdiction: KZ' → root) -->
      <path class="wire" d="M114.5 110 L220.5 44"/>
      <path class="wire lit" d="M326.5 110 L220.5 44"/>
      <path class="wire" d="M61.5 180 L114.5 110"/>
      <path class="wire" d="M167.5 180 L114.5 110"/>
      <path class="wire lit" d="M273.5 180 L326.5 110"/>
      <path class="wire" d="M379.5 180 L326.5 110"/>
      <path class="wire" d="M35 250 L61.5 180"/><path class="wire" d="M88 250 L61.5 180"/>
      <path class="wire" d="M141 250 L167.5 180"/><path class="wire" d="M194 250 L167.5 180"/>
      <path class="wire lit" d="M247 250 L273.5 180"/><path class="wire" d="M300 250 L273.5 180"/>
      <path class="wire" d="M353 250 L379.5 180"/><path class="wire" d="M406 250 L379.5 180"/>
      <!-- nodes -->
      <circle class="node root" cx="220.5" cy="44" r="11"/>
      <circle class="node" cx="114.5" cy="110" r="8"/><circle class="node" cx="326.5" cy="110" r="8"/>
      <circle class="node" cx="61.5" cy="180" r="7"/><circle class="node" cx="167.5" cy="180" r="7"/>
      <circle class="node" cx="273.5" cy="180" r="7"/><circle class="node" cx="379.5" cy="180" r="7"/>
      <!-- leaves (real leaf-hash prefixes; leaf 5 disclosed) -->
      <g><rect class="lf" x="17" y="250" width="36" height="34"/><text class="lh" x="35" y="271">7b5a</text></g>
      <g><rect class="lf" x="70" y="250" width="36" height="34"/><text class="lh" x="88" y="271">3264</text></g>
      <g><rect class="lf" x="123" y="250" width="36" height="34"/><text class="lh" x="141" y="271">345a</text></g>
      <g><rect class="lf" x="176" y="250" width="36" height="34"/><text class="lh" x="194" y="271">ddc9</text></g>
      <g><rect class="lf on" x="229" y="250" width="36" height="34"/><text class="lh on" x="247" y="266">KZ</text><text class="lh on" x="247" y="279" style="font-size:8px">juris</text></g>
      <g><rect class="lf" x="282" y="250" width="36" height="34"/><text class="lh" x="300" y="271">4c54</text></g>
      <g><rect class="lf" x="335" y="250" width="36" height="34"/><text class="lh" x="353" y="271">4445</text></g>
      <g><rect class="lf sealed" x="388" y="250" width="36" height="34"/><text class="lh" x="406" y="271">C◇</text></g>
      <!-- annotation -->
      <text class="anno" x="238" y="40">root → 32 B on-chain</text>
    </svg>
    <div class="tblock"><span>tessera</span><span>merkle tree</span><span>root&nbsp;<b>0xc501…a0ba</b></span></div>
  </div>
</body>
</html>
